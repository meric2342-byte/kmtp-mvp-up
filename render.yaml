# Render Blueprint — FastAPI 백엔드 배포 설정
# Render 대시보드에서 이 저장소를 연결하면 자동으로 이 설정을 읽습니다.
services:
  - type: web
    name: kmtp-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      # 배포 후, 프론트 도메인이 기본값과 다르면 여기에 추가
      # - key: ALLOWED_ORIGINS
      #   value: https://your-frontend.vercel.app
